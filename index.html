<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizMaster - Hệ thống luyện thi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light" style="font-family: &quot;Inter&quot;, sans-serif">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-5">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">📝 QuizMaster</a>
        <div class="ms-auto">
          <a href="admin.html" class="btn btn-light btn-sm fw-bold text-primary"
            >Kênh Giáo Viên</a
          >
        </div>
      </div>
    </nav>
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 text-center">
          <h3>6</h3>
          <p class="text-muted mb-0">Môn học</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 text-center">
          <h3>120+(thật ra là 7)</h3>
          <p class="text-muted mb-0">Câu hỏi</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 text-center">
          <h3>24/7</h3>
          <p class="text-muted mb-0">Luyện tập</p>
        </div>
      </div>
    </div>
    <div class="container">
      <div id="topic-container">
        <div class="text-center mb-5">
          <h1 class="fw-bold text-dark">Hôm nay bạn muốn học gì?</h1>
          <p class="text-muted">
            Chọn một chủ đề dưới đây để bắt đầu kiểm tra kiến thức.
          </p>
        </div>
        <div id="topic-list" class="row g-4">
          <div class="col-12 text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Đang tải danh sách chủ đề...</p>
          </div>
        </div>
      </div>

      <div id="quiz-section" class="d-none">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-4">
              <div
                class="card-header bg-white py-3 d-flex justify-content-between align-items-center"
              >
                <h4 id="quiz-title" class="mb-0 fw-bold text-primary">
                  Tiêu đề bài thi
                </h4>
                <span class="badge bg-primary text-white px-3 py-2 border"
                  >Đang diễn ra</span
                >
              </div>
              <div class="card-body p-4">
                <div id="question-container"></div>
                <div class="text-center mt-4">
                  <button
                    id="btn-submit"
                    class="btn btn-success btn-lg px-5 fw-bold shadow"
                  >
                    <i class="bi bi-send-fill"></i> Nộp bài ngay
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="resultModal"
      data-bs-backdrop="static"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-primary text-white border-0">
            <h5 class="modal-title fw-bold">Kết quả bài làm</h5>
          </div>
          <div class="modal-body text-center py-5" id="result-body"></div>
          <div class="modal-footer border-0 justify-content-center">
            <button
              type="button"
              class="btn btn-primary px-4 fw-bold"
              onclick="location.reload()"
            >
              <i class="bi bi-arrow-repeat"></i> Hoàn thành & Quay lại
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
