<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống Quản trị - QuizMaster</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#"
          ><i class="bi bi-shield-lock-fill"></i> QuizMaster Admin</a
        >
        <div class="ms-auto">
          <a href="index.html" class="btn btn-outline-light btn-sm"
            ><i class="bi bi-house-door"></i> Xem trang chủ</a
          >
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <ul
            class="nav nav-pills mb-4 bg-white p-2 rounded shadow-sm"
            id="adminTab"
            role="tablist"
          >
            <li class="nav-item">
              <button
                class="nav-link active fw-bold"
                id="q-tab"
                data-bs-toggle="tab"
                data-bs-target="#questions"
              >
                <i class="bi bi-database-fill-gear"></i> Quản lý câu hỏi
              </button>
            </li>
            <li class="nav-item">
              <button
                class="nav-link fw-bold"
                id="r-tab"
                data-bs-toggle="tab"
                data-bs-target="#results"
              >
                <i class="bi bi-person-badge-fill"></i> Lịch sử làm bài
              </button>
            </li>
          </ul>

          <div class="tab-content" id="adminTabContent">
            <div class="tab-pane fade show active" id="questions">
              <div class="card border-0 shadow-sm">
                <div
                  class="card-header bg-white py-3 d-flex justify-content-between align-items-center"
                >
                  <h5 class="mb-0 fw-bold text-primary">Ngân hàng câu hỏi</h5>
                  <button
                    class="btn btn-primary shadow-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#addQuestionModal"
                  >
                    <i class="bi bi-plus-circle"></i> Thêm câu hỏi mới
                  </button>
                </div>
                <div class="card-body p-0">
                  <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                      <thead class="table-light">
                        <tr>
                          <th class="ps-4">Nội dung câu hỏi</th>
                          <th>Chủ đề</th>
                          <th>Độ khó</th>
                          <th class="text-end pe-4">Thao tác</th>
                        </tr>
                      </thead>
                      <tbody id="admin-question-list"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

            <div class="tab-pane fade" id="results">
              <div class="card border-0 shadow-sm">
                <div class="card-body">
                  <table class="table">
                    <thead>
                      <tr>
                        <th>Học sinh</th>
                        <th>Điểm</th>
                        <th>Thời gian</th>
                      </tr>
                    </thead>
                    <tbody id="admin-result-list"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="addQuestionModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <form id="form-add-question" class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Thêm câu hỏi mới</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label fw-bold">Chọn chủ đề</label>
              <select class="form-select" id="selectTopic" required></select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Nội dung câu hỏi</label>
              <textarea class="form-control" id="content" required></textarea>
            </div>
            <div class="row">
              <div class="col-6 mb-2">
                <input
                  type="text"
                  class="form-control"
                  id="opt0"
                  placeholder="Đáp án A"
                  required
                />
              </div>
              <div class="col-6 mb-2">
                <input
                  type="text"
                  class="form-control"
                  id="opt1"
                  placeholder="Đáp án B"
                  required
                />
              </div>
              <div class="col-6 mb-2">
                <input
                  type="text"
                  class="form-control"
                  id="opt2"
                  placeholder="Đáp án C"
                  required
                />
              </div>
              <div class="col-6 mb-2">
                <input
                  type="text"
                  class="form-control"
                  id="opt3"
                  placeholder="Đáp án D"
                  required
                />
              </div>
            </div>
            <div class="mt-3">
              <label class="form-label fw-bold">Đáp án đúng</label>
              <select class="form-select" id="correct_answer">
                <option value="0">A</option>
                <option value="1">B</option>
                <option value="2">C</option>
                <option value="3">D</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Lưu câu hỏi</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
